name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest
    # bot の無限ループ防止（必須）
    if: |
      github.actor != 'claude[bot]' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'issue_comment' &&
         contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' &&
         contains(github.event.issue.labels.*.name, 'claude')) ||
        (github.event_name == 'pull_request_review_comment' &&
         contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' &&
         contains(github.event.review.body, '@claude'))
      )
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js（スタックに応じて書き換える）
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # 許可コマンドを明示的にホワイトリスト指定（セキュリティ上必須）
          # スタックに応じて追記する（pip / cargo / go 等）
          allowed_tools: |
            Bash(npm run *),
            Bash(npm test),
            Bash(npm ci),
            Bash(git *),
            Read,Edit,Write,MultiEdit,Glob,Grep
          custom_instructions: |
            必ずTDDで実装してください（テストを先に書いてから実装する）。
            実装後はテスト → 型チェック → リント を順番に実行し、
            すべて通過してからPRを作成してください。
            PRのタイトルは「[feat/fix/refactor] 機能名」の形式にしてください。
